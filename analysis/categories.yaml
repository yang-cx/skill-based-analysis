version: 1

# Category axis for (category, region) partitioning.
# These categories mirror the reference H->gammagamma topology split, with proxy definitions
# where legacy conversion-era observables are unavailable in open data.
categories:
  - category_id: cat_2jet
    label: "VBF-enriched 2-jet"
    assignment_basis: topology_selection
    assignment_definition: "region_id == SR_2JET"
    mutually_exclusive: true
    coverage: full
    is_default: false
    priority: 0
    notes: "Proxy to the reference VBF category using available jet kinematics and JVT."

  - category_id: cat_unconv_central_low_ptt
    label: "Unconv central low-pTt"
    assignment_basis: topology_selection
    assignment_definition: "region_id == SR_UNCONV_CENTRAL_LOW_PTT"
