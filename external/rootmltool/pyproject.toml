[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rootmltool"
version = "0.1.0"
description = "Deterministic ROOT inspection and extraction toolkit for ML pipelines"
readme = "README.md"
requires-python = ">=3.10"
authors = [
  { name = "rootmltool maintainers" }
]
license = { text = "MIT" }
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Intended Audience :: Science/Research",
  "Topic :: Scientific/Engineering :: Physics",
]
dependencies = [
  "uproot>=5.0.0",
  "awkward>=2.0.0",
  "numpy>=1.24.0",
  "pandas>=2.0.0",
  "pydantic>=2.6.0",
  "rich>=13.0.0",
]

[project.optional-dependencies]
parquet = [
  "pyarrow>=14.0.0",
]
dev = [
  "pytest>=8.0.0",
  "pytest-cov>=5.0.0",
]

[project.scripts]
rootmltool = "rootmltool.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q"
